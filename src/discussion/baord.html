<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Discussion Board</title>

    <!-- Required JS file -->
    <script src="board.js" defer></script>

    <!-- Simple CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
        }

        section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        article {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        footer {
            font-size: 12px;
            color: gray;
        }

        .actions button {
            margin-right: 10px;
            background-color: #555;
        }
    </style>
</head>

<body>

<!-- Header -->
<header>
    <h1>General Discussion Board</h1>
</header>

<main>

    <!-- Section 1: New Topic -->
    <section>
        <h2>Start a New Topic</h2>

        <form id="new-topic-form" action="#">
            <fieldset>
                <legend>New Topic Details</legend>

                <label for="topic-subject">Topic Subject:</label>
                <input type="text" id="topic-subject" required>

                <label for="topic-message">Message:</label>
                <textarea id="topic-message" rows="6" required></textarea>

                <button id="create-topic" type="submit">Create Topic</button>
            </fieldset>
        </form>
    </section>

    <!-- Section 2: Topics -->
    <section>
        <h2>All Topics</h2>

        <!-- IMPORTANT: required container for JS -->
        <div id="topic-list-container"></div>

    </section>

</main>

</body>
</html>
