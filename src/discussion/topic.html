<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Topic Details</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- JS -->
    <script src="topic.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header>
        <h1 id="topic-subject"></h1>
    </header>

    <!-- Main -->
    <main>

        <!-- Section 1: Original Post -->
        <article id="original-post">

            <p id="op-message"></p>

            <footer id="op-footer"></footer>

            <div id="op-actions">
                <!-- topic.js will inject Edit/Delete buttons here -->
            </div>

        </article>


        <!-- Section 2: Replies -->
        <section id="replies-section">

            <h2>Replies</h2>

            <div id="reply-list-container">
                <!-- topic.js will inject replies here -->
            </div>


            <!-- Section 3: Add Reply -->
            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Your Reply:</label>
                    <textarea id="new-reply" required></textarea>

                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>

        </section>

    </main>

</body>
</html>
