<!--
  Requirement: Create the Student View for the Weekly Breakdown

  Instructions:
  This page is a read-only view for students to see the plan for all weeks.
  Each week should link to its dedicated detail page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Course Breakdown</title>
    <link rel="stylesheet" href="styles.css">
    <script src="list.js" defer></script>
</head>
<body>

    <header>
        <h1>Weekly Course Breakdown</h1>
    </header>

    <main>
        <section id="week-list-section">
            <!-- list.js will inject one <article> per week here.

            Example Week Article Structure (do NOT hardcode real data;
            list.js fetches it from the API):

            <article>
                <h2>Week 1: Introduction to HTML</h2>
                <p>Starts on: 2025-01-13</p>
                <p>Learn HTML fundamentals...</p>
                <a href="details.html?id=1">View Details & Discussion</a>
            </article>

            Note: the href MUST be "details.html?id=<id>" so that
            details.js can read the id from the URL query string.
            -->
        </section>
    </main>

</body>
</html>
